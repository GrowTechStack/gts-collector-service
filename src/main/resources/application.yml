server:
  port: 29999

spring:
  application:
    name: GrowTechStack

  datasource:
    url: jdbc:h2:file:./GrowTechStack.db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      continue-on-error: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: devfeed-summary-result
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.gts.collector.global.kafka.dto"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "com.gts.collector.global.kafka.dto.SummaryResultMessage"

springdoc:
  swagger-ui:
    try-it-out-enabled: true
    operations-sorter: alpha

ai-summary:
  base-url: http://localhost:29998

logging:
  level:
    org.hibernate.orm.queries: info
    com.gts.collector: debug
