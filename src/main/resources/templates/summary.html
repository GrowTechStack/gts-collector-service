<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${content.title} + ' - GrowTechStack'">게시글 요약</title>
</head>
<body>
    <section>
        <style>
        .tag-badge {
            font-size: 0.85rem;
            padding: 4px 12px;
            background: #f8f9fa;
            color: #666;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-right: 8px;
            font-weight: 500;
        }
        </style>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- 뒤로가기 -->
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">← 목록으로 돌아가기</a></li>
                    </ol>
                </nav>

                <div class="card shadow-sm border-0 p-4 p-md-5">
                    <!-- 썸네일 -->
                    <div class="mb-4" th:if="${content.thumbnailUrl != null}">
                        <img th:src="${content.thumbnailUrl}" alt="thumbnail"
                             onerror="this.onerror=null;this.src='/img/default-thumbnail.svg'"
                             style="width:100%; max-height:360px; object-fit:cover; border-radius:12px; border:1px solid #e9ecef;">
                    </div>

                    <!-- 헤더 정보 -->
                    <div class="mb-4">
                        <div class="d-flex align-items-center mb-2">
                            <img th:src="${siteLogos[content.siteName] != null ? siteLogos[content.siteName] : '/img/default-logo.svg'}"
                                 alt="logo"
                                 onerror="this.onerror=null;this.src='/img/default-logo.svg'"
                                 style="width:20px; height:20px; border-radius:50%; object-fit:cover; border:1px solid #e9ecef; margin-right:8px;">
                            <span class="badge bg-primary bg-opacity-10 text-primary me-2" th:text="${content.siteName}">사이트명</span>
                            <small class="text-muted" th:text="${#temporals.format(content.publishedAt, 'yyyy년 MM월 dd일')}">발행일</small>
                        </div>
                        <h1 class="fw-bold mb-3" th:text="${content.title}">게시글 제목</h1>
                        <div class="text-muted small d-flex align-items-center gap-2">
                            <span style="display:inline-flex; align-items:center; gap:3px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                [[${content.viewCount}]]
                            </span>
                            <span>&bull;</span>
                            <span th:each="tag : ${#strings.arraySplit(content.tags, ',')}"
                                  class="tag-badge" th:text="${tag}">태그</span>
                        </div>
                    </div>

                    <hr class="my-4 text-light">

                    <!-- 요약 본문 -->
                    <div class="content-body mb-5 fs-5 leading-relaxed text-secondary" style="line-height: 1.8;">
                        <p th:text="${content.summary}">요약 내용이 표시됩니다.</p>
                    </div>

                    <!-- 원문 보기 버튼 -->
                    <div class="text-center mt-5 pt-4 border-top">
                        <p class="text-muted small mb-3">더 자세한 내용이 궁금하신가요?</p>
                        <a th:href="${content.originalUrl}" target="_blank" class="btn btn-primary btn-lg px-5 fw-bold">원문 보기</a>
                    </div>
                </div>
            </div>
        </div>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', () => {
                const id = [[${content.id}]];
                const idsStr = localStorage.getItem('read_content_ids');
                let ids = idsStr ? JSON.parse(idsStr) : [];
                if (!ids.includes(id)) {
                    ids.push(id);
                    localStorage.setItem('read_content_ids', JSON.stringify(ids));
                }
            });
        </script>
    </section>
</body>
</html>
