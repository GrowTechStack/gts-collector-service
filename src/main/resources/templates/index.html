<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>최신 피드 - GrowTechStack</title>
</head>
<body>
    <section>
        <style>
        .content-card {
            position: relative;
            z-index: 1;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
            background-color: #ffffff;
            margin-bottom: 20px;
        }
        .content-card:hover {
            border-color: #0d6efd;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        /* 제목 스타일 */
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #111111;
            margin-bottom: 8px;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        /* 요약 텍스트 */
        .card-text {
            color: #555555;
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.55;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 태그 칩 */
        .tag-badge {
            font-size: 0.85rem;
            padding: 4px 12px;
            background: #f8f9fa;
            color: #666;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-right: 8px;
            font-weight: 500;
        }

        /* 하단 메타바: 로고 최소화 및 동그랗게 */
        .meta-bar {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: 20px;
        }
        .site-logo-mini {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 6px;
            object-fit: cover;
            border: 1px solid #f1f3f5;
            vertical-align: middle;
        }

        /* 우측 썸네일 */
        .thumbnail-box {
            width: 140px;
            height: 95px;
            margin-left: 20px;
            flex-shrink: 0;
        }
        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            background-color: #f1f3f5;
        }

        /* 읽음 상태: 더 세련되게 */
        .is-read-text { color: #adb5bd !important; font-weight: 500 !important; }
        </style>
        <div class="d-flex justify-content-center gap-4" style="align-items: flex-start;">
            <!-- 메인 콘텐츠 -->
            <div style="width: 100%; max-width: 850px; min-width: 0;">
                
                <!-- 검색바 -->
                <div class="mb-3">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control"
                               placeholder="제목, 내용으로 검색..."
                               style="border-radius: 10px 0 0 10px; border-color: #e9ecef; font-size: 0.9rem;">
                        <button class="btn btn-primary" onclick="doSearch()"
                                style="border-radius: 0 10px 10px 0; font-size: 0.9rem;">검색</button>
                        <button class="btn btn-outline-secondary ms-2" id="resetBtn" onclick="resetSearch()" style="display:none; border-radius: 10px; font-size: 0.9rem;">초기화</button>
                    </div>
                </div>

                <!-- 검색 결과 헤더 -->
                <div id="searchResultHeader" class="mb-3" style="display:none; font-size: 0.85rem; color: #888;"></div>

                <!-- 태그 필터 컴포넌트 -->
                <div th:replace="~{fragments/tag-nav :: tagNav(${currentTag})}"></div>

                <!-- 콘텐츠 리스트 -->
                <div id="contentList">
                <div th:each="content : ${contents.content}" class="content-item" th:data-id="${content.id}">
                    <div class="card content-card border-0 shadow-sm">
                        <div class="card-body p-4 d-flex align-items-center">
                            
                            <div class="flex-grow-1">
                                <!-- 1. 제목 -->
                                <h5 class="card-title">
                                    <a th:href="@{/contents/{id}(id=${content.id})}" 
                                       class="text-decoration-none text-dark stretched-link" 
                                       th:text="${content.title}"
                                       th:onclick="'markAsRead(' + ${content.id} + ')'">제목</a>
                                </h5>
                                
                                <!-- 2. 요약 -->
                                <p class="card-text" th:text="${content.summary}">내용 요약...</p>
                                
                                <!-- 3. 태그 리스트 -->
                                <div class="d-flex flex-wrap" style="position: relative; z-index: 2;">
                                    <span th:each="tag : ${#strings.arraySplit(content.tags, ',')}" 
                                          class="tag-badge" th:text="${tag}">태그</span>
                                </div>
                                
                                <!-- 4. 하단 메타바 -->
                                <div class="meta-bar">
                                    <img th:src="${siteLogos[content.siteName] != null ? siteLogos[content.siteName] : '/img/default-logo.svg'}"
                                         class="site-logo-mini" alt="icon"
                                         onerror="this.onerror=null;this.src='/img/default-logo.svg'">
                                    <span class="fw-bold text-dark me-2" th:text="${content.siteName}">사이트명</span>
                                    <span class="me-2 text-muted">·</span>
                                    <span th:text="${#temporals.format(content.publishedAt, 'yyyy년 MM월 dd일')}">날짜</span>
                                    <span class="mx-2">·</span>
                                    <span style="display:inline-flex; align-items:center; gap:3px;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                        [[${content.viewCount}]]
                                    </span>
                                </div>
                            </div>

                            <!-- 5. 썸네일 (항상 표시, 없으면 기본 이미지) -->
                            <div class="thumbnail-box d-none d-md-block">
                                <img th:src="${content.thumbnailUrl != null ? content.thumbnailUrl : '/img/default-thumbnail.svg'}"
                                     class="thumbnail-img" alt="Thumbnail"
                                     onerror="this.onerror=null;this.src='/img/default-thumbnail.svg'">
                            </div>
                        </div>
                    </div>
                </div>

                </div><!-- /contentList -->

                <!-- 페이징 -->
                <nav id="pagination" th:if="${contents.totalPages > 1}" class="mt-5 mb-5"
                     th:with="startPage=${T(java.lang.Math).max(0, T(java.lang.Math).min(contents.number - 2, contents.totalPages - 5))},
                              endPage=${T(java.lang.Math).min(contents.totalPages - 1, startPage + 4)}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${contents.first} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-muted px-3" th:href="@{/(page=${contents.number - 1}, tag=${currentTag}, q=${q})}">이전</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            class="page-item" th:classappend="${i == contents.number} ? 'active'">
                            <a class="page-link border-0 rounded-circle mx-1" th:href="@{/(page=${i}, tag=${currentTag}, q=${q})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${contents.last} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-muted px-3" th:href="@{/(page=${contents.number + 1}, tag=${currentTag}, q=${q})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- 우측 사이드바: 인기 기술 블로그 -->
            <th:block th:replace="~{fragments/source-sidebar :: sourceSidebar(${rssSources})}"></th:block>
        </div>

        <script th:inline="javascript">
            const siteLogosMap = /*[[${siteLogos}]]*/ {};
            function getReadIds() {
                const ids = localStorage.getItem('read_content_ids');
                return ids ? JSON.parse(ids).map(Number) : [];
            }
            function markAsRead(id) {
                const ids = getReadIds();
                if (!ids.includes(Number(id))) {
                    ids.push(Number(id));
                    localStorage.setItem('read_content_ids', JSON.stringify(ids));
                }
            }
            function updateReadStatus() {
                const readIds = getReadIds();
                document.querySelectorAll('.content-item').forEach(item => {
                    const id = Number(item.getAttribute('data-id'));
                    const card = item.querySelector('.content-card');
                    const title = item.querySelector('.card-title');
                    if (readIds.includes(id)) {
                        card.style.setProperty('background-color', '#fcfcfc', 'important');
                        card.style.setProperty('opacity', '0.8', 'important');
                        if (title) title.classList.add('is-read-text');
                    }
                });
            }
            // 검색
            const contentList = document.getElementById('contentList');
            const pagination = document.getElementById('pagination');
            const originalContent = contentList ? contentList.innerHTML : '';
            const originalPagination = pagination ? pagination.outerHTML : '';

            function doSearchPage(page) {
                doSearch(page);
            }

            function doSearch(page = 0) {
                const q = document.getElementById('searchInput').value.trim();
                if (!q) return;

                fetch(`/api/v1/contents/search?q=${encodeURIComponent(q)}&page=${page}&size=12&sort=publishedAt,desc`)
                    .then(res => res.json())
                    .then(data => {
                        const items = data.data?.content || [];
                        const total = data.data?.totalElements || 0;

                        document.getElementById('searchResultHeader').style.display = 'block';
                        document.getElementById('searchResultHeader').innerHTML =
                            `'<strong style="color:#111">${q}</strong>' 검색 결과 (${total}건)`;
                        document.getElementById('resetBtn').style.display = 'inline-block';

                        if (!contentList) return;
                        contentList.innerHTML = items.length === 0
                            ? '<div class="text-center text-muted py-5">검색 결과가 없습니다.</div>'
                            : items.map(c => `
                                <div class="content-item">
                                    <div class="card content-card border-0 shadow-sm">
                                        <div class="card-body p-4 d-flex align-items-center">
                                            <div class="flex-grow-1">
                                                <h5 class="card-title">
                                                    <a href="/contents/${c.id}" class="text-decoration-none text-dark">${c.title}</a>
                                                </h5>
                                                <p class="card-text">${c.summary || ''}</p>
                                                <div class="meta-bar">
                                                    <img src="${siteLogosMap[c.siteName] || '/img/default-logo.svg'}" class="site-logo-mini" alt="icon"
                                                         onerror="this.onerror=null;this.src='/img/default-logo.svg'">
                                                    <span class="fw-bold text-dark me-2">${c.siteName || ''}</span>
                                                    <span class="me-2 text-muted">·</span>
                                                    <span>${c.publishedAt ? c.publishedAt.substring(0,10).replace(/-/g, '.') : ''}</span>
                                                </div>
                                            </div>
                                            <div class="thumbnail-box d-none d-md-block">
                                                <img src="${c.thumbnailUrl || '/img/default-thumbnail.svg'}" class="thumbnail-img" alt="Thumbnail"
                                                     onerror="this.onerror=null;this.src='/img/default-thumbnail.svg'">
                                            </div>
                                        </div>
                                    </div>
                                </div>`).join('');

                        // 페이징 동적 업데이트
                        const totalPages = data.data?.totalPages || 0;
                        const paginationEl = document.getElementById('pagination');
                        if (paginationEl) {
                            if (totalPages <= 1) {
                                paginationEl.style.display = 'none';
                            } else {
                                paginationEl.style.display = '';
                                const currentPage = data.data?.number || 0;
                                const startPage = Math.max(0, Math.min(currentPage - 2, totalPages - 5));
                                const endPage = Math.min(totalPages - 1, startPage + 4);
                                let pageItems = '';
                                pageItems += `<li class="page-item${currentPage === 0 ? ' disabled' : ''}">
                                    <a class="page-link border-0 bg-transparent text-muted px-3" href="#" onclick="doSearchPage(${currentPage - 1}); return false;">이전</a>
                                </li>`;
                                for (let i = startPage; i <= endPage; i++) {
                                    pageItems += `<li class="page-item${i === currentPage ? ' active' : ''}">
                                        <a class="page-link border-0 px-3${i === currentPage ? ' text-white' : ' text-muted bg-transparent'}" href="#" onclick="doSearchPage(${i}); return false;">${i + 1}</a>
                                    </li>`;
                                }
                                pageItems += `<li class="page-item${currentPage === totalPages - 1 ? ' disabled' : ''}">
                                    <a class="page-link border-0 bg-transparent text-muted px-3" href="#" onclick="doSearchPage(${currentPage + 1}); return false;">다음</a>
                                </li>`;
                                paginationEl.querySelector('ul').innerHTML = pageItems;
                            }
                        }
                    });
            }

            function resetSearch() {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResultHeader').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'none';
                if (contentList) contentList.innerHTML = originalContent;
                const paginationEl = document.getElementById('pagination');
                if (paginationEl && originalPagination) {
                    paginationEl.outerHTML = originalPagination;
                } else if (paginationEl) {
                    paginationEl.style.display = '';
                }
                updateReadStatus();
            }

            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') doSearch();
            });

            document.addEventListener('DOMContentLoaded', updateReadStatus);
            window.addEventListener('pageshow', updateReadStatus);
        </script>
    </section>
</body>
</html>
