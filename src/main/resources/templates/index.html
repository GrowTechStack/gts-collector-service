<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>최신 피드 - GrowTechStack</title>
</head>
<body>
    <section>
        <style>
        .content-card {
            position: relative;
            z-index: 1;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
            background-color: #ffffff;
            margin-bottom: 20px;
        }
        .content-card:hover {
            border-color: #0d6efd;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        /* 제목 스타일 */
        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #111111;
            margin-bottom: 8px;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        /* 요약 텍스트 */
        .card-text {
            color: #555555;
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 1.55;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 태그 칩 */
        .tag-badge {
            font-size: 0.85rem;
            padding: 4px 12px;
            background: #f8f9fa;
            color: #666;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-right: 8px;
            font-weight: 500;
        }

        /* 하단 메타바: 로고 최소화 및 동그랗게 */
        .meta-bar {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: 20px;
        }
        .site-logo-mini {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 6px;
            object-fit: cover;
            border: 1px solid #f1f3f5;
            vertical-align: middle;
        }

        /* 우측 썸네일 */
        .thumbnail-box {
            width: 140px;
            height: 95px;
            margin-left: 20px;
            flex-shrink: 0;
        }
        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            background-color: #f1f3f5;
        }

        /* 읽음 상태: 더 세련되게 */
        .is-read-text { color: #adb5bd !important; font-weight: 500 !important; }

        /* 사이드바 */
        .source-sidebar {
            position: sticky;
            top: 80px;
            width: 220px;
            flex-shrink: 0;
        }
        .source-sidebar .sidebar-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 16px;
        }
        .source-sidebar .sidebar-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #888;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .source-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f1f3f5;
            font-size: 0.85rem;
            color: #333;
        }
        .source-item:last-child { border-bottom: none; }
        .source-item img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
            border: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        .source-item .active-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28a745;
            margin-left: auto;
            flex-shrink: 0;
        }
        .btn-view-all {
            width: 100%;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
        }
        .btn-view-all:hover { background: #e9ecef; }

        /* 전체보기 팝업 */
        .source-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .source-modal-overlay.show { display: flex; }
        .source-modal {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            width: 360px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .source-modal .modal-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .source-modal .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: #111;
        }
        .source-modal .btn-close-modal {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #888;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        /* 호버 카드 */
        #hover-card {
            display: none;
            position: fixed;
            width: 220px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 9998;
        }
        #hover-card .hc-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        #hover-card .hc-header img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
            border: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        #hover-card .hc-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #111;
        }
        #hover-card .hc-stat {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #444;
            margin-bottom: 4px;
        }
        #hover-card .hc-stat span.label { color: #aaa; }
        #hover-card .hc-divider {
            border: none;
            border-top: 1px solid #f1f3f5;
            margin: 8px 0;
        }
        #hover-card .hc-visit {
            display: block;
            margin-top: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #0d6efd;
            background: #f0f4ff;
            border-radius: 8px;
            padding: 6px;
            text-decoration: none;
            pointer-events: auto;
        }
        #hover-card .hc-visit:hover { background: #dce8ff; }
        #hover-card .hc-visit { pointer-events: auto; }
        </style>
        <div class="d-flex justify-content-center gap-4" style="align-items: flex-start;">
            <!-- 메인 콘텐츠 -->
            <div style="width: 100%; max-width: 850px; min-width: 0;">
                
                <!-- 검색바 -->
                <div class="mb-3">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control"
                               placeholder="제목, 내용으로 검색..."
                               style="border-radius: 10px 0 0 10px; border-color: #e9ecef; font-size: 0.9rem;">
                        <button class="btn btn-primary" onclick="doSearch()"
                                style="border-radius: 0 10px 10px 0; font-size: 0.9rem;">검색</button>
                        <button class="btn btn-outline-secondary ms-2" id="resetBtn" onclick="resetSearch()" style="display:none; border-radius: 10px; font-size: 0.9rem;">초기화</button>
                    </div>
                </div>

                <!-- 검색 결과 헤더 -->
                <div id="searchResultHeader" class="mb-3" style="display:none; font-size: 0.85rem; color: #888;"></div>

                <!-- 태그 필터 컴포넌트 -->
                <div th:replace="~{fragments/components :: tagNav(${currentTag})}"></div>

                <!-- 콘텐츠 리스트 -->
                <div id="contentList">
                <div th:each="content : ${contents.content}" class="content-item" th:data-id="${content.id}">
                    <div class="card content-card border-0 shadow-sm">
                        <div class="card-body p-4 d-flex align-items-center">
                            
                            <div class="flex-grow-1">
                                <!-- 1. 제목 -->
                                <h5 class="card-title">
                                    <a th:href="@{/contents/{id}(id=${content.id})}" 
                                       class="text-decoration-none text-dark stretched-link" 
                                       th:text="${content.title}"
                                       th:onclick="'markAsRead(' + ${content.id} + ')'">제목</a>
                                </h5>
                                
                                <!-- 2. 요약 -->
                                <p class="card-text" th:text="${content.summary}">내용 요약...</p>
                                
                                <!-- 3. 태그 리스트 -->
                                <div class="d-flex flex-wrap" style="position: relative; z-index: 2;">
                                    <span th:each="tag : ${#strings.arraySplit(content.tags, ',')}" 
                                          class="tag-badge" th:text="${tag}">태그</span>
                                </div>
                                
                                <!-- 4. 하단 메타바 -->
                                <div class="meta-bar">
                                    <img th:src="${siteLogos[content.siteName] != null ? siteLogos[content.siteName] : '/img/default-logo.svg'}"
                                         class="site-logo-mini" alt="icon">
                                    <span class="fw-bold text-dark me-2" th:text="${content.siteName}">사이트명</span>
                                    <span class="me-2 text-muted">·</span>
                                    <span th:text="${#temporals.format(content.publishedAt, 'yyyy년 MM월 dd일')}">날짜</span>
                                    <span class="mx-2">·</span>
                                    <span>조회 [[${content.viewCount}]]</span>
                                </div>
                            </div>

                            <!-- 5. 썸네일 (항상 표시, 없으면 기본 이미지) -->
                            <div class="thumbnail-box d-none d-md-block">
                                <img th:src="${content.thumbnailUrl != null ? content.thumbnailUrl : '/img/default-thumbnail.svg'}"
                                     class="thumbnail-img" alt="Thumbnail">
                            </div>
                        </div>
                    </div>
                </div>

                </div><!-- /contentList -->

                <!-- 페이징 -->
                <nav id="pagination" th:if="${contents.totalPages > 1}" class="mt-5 mb-5">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${contents.first} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-muted px-3" th:href="@{/(page=${contents.number - 1}, tag=${currentTag}, q=${q})}">이전</a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, contents.totalPages - 1)}"
                            class="page-item" th:classappend="${i == contents.number} ? 'active'">
                            <a class="page-link border-0 rounded-circle mx-1" th:href="@{/(page=${i}, tag=${currentTag}, q=${q})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${contents.last} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-muted px-3" th:href="@{/(page=${contents.number + 1}, tag=${currentTag}, q=${q})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- 우측 사이드바: 수집 중인 기술 블로그 -->
            <div class="source-sidebar d-none d-xl-block">
                <div class="sidebar-card">
                    <div class="sidebar-title">인기 기술 블로그</div>

                    <!-- 상위 5개 -->
                    <div class="source-item-wrap"
                         th:each="source, stat : ${rssSources}"
                         th:if="${stat.index < 5}"
                         th:data-name="${source.siteName}"
                         th:data-logo="${source.logoUrl != null ? source.logoUrl : '/img/default-logo.svg'}"
                         th:data-posts="${source.postCount}"
                         th:data-views="${#numbers.formatInteger(source.totalViewCount, 1, 'COMMA')}"
                         th:data-latest="${source.latestPublishedAt != null ? #temporals.format(source.latestPublishedAt, 'MM월 dd일') : ''}"
                         th:data-siteurl="${source.siteUrl}"
                         onmouseenter="showHoverCard(event, this)"
                         onmouseleave="hideHoverCard(this)">
                        <div class="source-item">
                            <img th:src="${source.logoUrl != null ? source.logoUrl : '/img/default-logo.svg'}" alt="logo">
                            <span th:text="${source.siteName}">사이트명</span>
                            <span class="active-dot" th:if="${source.active}"></span>
                        </div>
                    </div>

                    <!-- 5개 초과 시 전체보기 버튼 -->
                    <button th:if="${#lists.size(rssSources) > 5}"
                            class="btn-view-all" onclick="openSourceModal()">
                        전체보기 ([[${#lists.size(rssSources)}]]개) →
                    </button>
                </div>
            </div>
        </div>

        <!-- 공통 호버 카드 (JS로 제어) -->
        <div id="hover-card">
            <div class="hc-header">
                <img id="hc-logo" src="" alt="logo">
                <span id="hc-name" class="hc-name"></span>
            </div>
            <hr class="hc-divider">
            <div class="hc-stat">
                <span class="label">포스트</span>
                <span id="hc-posts"></span>
            </div>
            <div class="hc-stat">
                <span class="label">총 조회수</span>
                <span id="hc-views"></span>
            </div>
            <div class="hc-stat" id="hc-latest-wrap">
                <span class="label">마지막 포스트</span>
                <span id="hc-latest"></span>
            </div>
            <a id="hc-visit" class="hc-visit" href="#" target="_blank">방문하기 →</a>
        </div>

        <!-- 전체보기 팝업 -->
        <div class="source-modal-overlay" id="sourceModal" onclick="closeSourceModal(event)">
            <div class="source-modal">
                <div class="modal-header-row">
                    <span class="modal-title">인기 기술 블로그</span>
                    <button class="btn-close-modal" onclick="closeSourceModal()">✕</button>
                </div>
                <div th:each="source : ${rssSources}">
                    <div class="source-item">
                        <img th:src="${source.logoUrl != null ? source.logoUrl : '/img/default-logo.svg'}" alt="logo">
                        <div style="flex:1; min-width:0;">
                            <div th:text="${source.siteName}" style="font-weight:600; font-size:0.85rem;">사이트명</div>
                            <div style="font-size:0.75rem; color:#aaa; margin-top:2px;">
                                포스트 <span th:text="${source.postCount}">0</span>개
                                · 조회 <span th:text="${#numbers.formatInteger(source.totalViewCount, 1, 'COMMA')}">0</span>회
                            </div>
                        </div>
                        <span class="active-dot" th:if="${source.active}"></span>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function getReadIds() {
                const ids = localStorage.getItem('read_content_ids');
                return ids ? JSON.parse(ids).map(Number) : [];
            }
            function markAsRead(id) {
                const ids = getReadIds();
                if (!ids.includes(Number(id))) {
                    ids.push(Number(id));
                    localStorage.setItem('read_content_ids', JSON.stringify(ids));
                }
            }
            function updateReadStatus() {
                const readIds = getReadIds();
                document.querySelectorAll('.content-item').forEach(item => {
                    const id = Number(item.getAttribute('data-id'));
                    const card = item.querySelector('.content-card');
                    const title = item.querySelector('.card-title');
                    if (readIds.includes(id)) {
                        card.style.setProperty('background-color', '#fcfcfc', 'important');
                        card.style.setProperty('opacity', '0.8', 'important');
                        if (title) title.classList.add('is-read-text');
                    }
                });
            }
            // 검색
            const contentList = document.getElementById('contentList');
            const pagination = document.getElementById('pagination');
            const originalContent = contentList ? contentList.innerHTML : '';
            const originalPagination = pagination ? pagination.outerHTML : '';

            function doSearchPage(page) {
                doSearch(page);
            }

            function doSearch(page = 0) {
                const q = document.getElementById('searchInput').value.trim();
                if (!q) return;

                fetch(`/api/v1/contents/search?q=${encodeURIComponent(q)}&page=${page}&size=12&sort=publishedAt,desc`)
                    .then(res => res.json())
                    .then(data => {
                        const items = data.data?.content || [];
                        const total = data.data?.totalElements || 0;

                        document.getElementById('searchResultHeader').style.display = 'block';
                        document.getElementById('searchResultHeader').innerHTML =
                            `'<strong style="color:#111">${q}</strong>' 검색 결과 (${total}건)`;
                        document.getElementById('resetBtn').style.display = 'inline-block';

                        if (!contentList) return;
                        contentList.innerHTML = items.length === 0
                            ? '<div class="text-center text-muted py-5">검색 결과가 없습니다.</div>'
                            : items.map(c => `
                                <div class="content-item">
                                    <div class="card content-card border-0 shadow-sm">
                                        <div class="card-body p-4 d-flex align-items-center">
                                            <div class="flex-grow-1">
                                                <h5 class="card-title">
                                                    <a href="/contents/${c.id}" class="text-decoration-none text-dark">${c.title}</a>
                                                </h5>
                                                <p class="card-text">${c.summary || ''}</p>
                                                <div class="meta-bar">
                                                    <img src="/img/default-logo.svg" class="site-logo-mini" alt="icon">
                                                    <span class="fw-bold text-dark me-2">${c.siteName || ''}</span>
                                                    <span class="me-2 text-muted">·</span>
                                                    <span>${c.publishedAt ? c.publishedAt.substring(0,10).replace(/-/g, '.') : ''}</span>
                                                </div>
                                            </div>
                                            <div class="thumbnail-box d-none d-md-block">
                                                <img src="${c.thumbnailUrl || '/img/default-thumbnail.svg'}" class="thumbnail-img" alt="Thumbnail">
                                            </div>
                                        </div>
                                    </div>
                                </div>`).join('');

                        // 페이징 동적 업데이트
                        const totalPages = data.data?.totalPages || 0;
                        const paginationEl = document.getElementById('pagination');
                        if (paginationEl) {
                            if (totalPages <= 1) {
                                paginationEl.style.display = 'none';
                            } else {
                                paginationEl.style.display = '';
                                const currentPage = data.data?.number || 0;
                                let pageItems = '';
                                pageItems += `<li class="page-item${currentPage === 0 ? ' disabled' : ''}">
                                    <a class="page-link border-0 bg-transparent text-muted px-3" href="#" onclick="doSearchPage(${currentPage - 1}); return false;">이전</a>
                                </li>`;
                                for (let i = 0; i < totalPages; i++) {
                                    pageItems += `<li class="page-item${i === currentPage ? ' active' : ''}">
                                        <a class="page-link border-0 px-3${i === currentPage ? ' text-white' : ' text-muted bg-transparent'}" href="#" onclick="doSearchPage(${i}); return false;">${i + 1}</a>
                                    </li>`;
                                }
                                pageItems += `<li class="page-item${currentPage === totalPages - 1 ? ' disabled' : ''}">
                                    <a class="page-link border-0 bg-transparent text-muted px-3" href="#" onclick="doSearchPage(${currentPage + 1}); return false;">다음</a>
                                </li>`;
                                paginationEl.querySelector('ul').innerHTML = pageItems;
                            }
                        }
                    });
            }

            function resetSearch() {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResultHeader').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'none';
                if (contentList) contentList.innerHTML = originalContent;
                const paginationEl = document.getElementById('pagination');
                if (paginationEl && originalPagination) {
                    paginationEl.outerHTML = originalPagination;
                } else if (paginationEl) {
                    paginationEl.style.display = '';
                }
                updateReadStatus();
            }

            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') doSearch();
            });

            document.addEventListener('DOMContentLoaded', updateReadStatus);
            window.addEventListener('pageshow', updateReadStatus);

            const hoverCard = document.getElementById('hover-card');
            let hideTimer = null;

            let activeItem = null;

            function showHoverCard(e, el) {
                clearTimeout(hideTimer);

                // 이전 호버 해제
                if (activeItem && activeItem !== el) {
                    activeItem.querySelector('.source-item span:not(.active-dot)').style.color = '';
                }
                activeItem = el;

                // 호버 텍스트 색상 변경
                el.querySelector('.source-item span:not(.active-dot)').style.color = '#0d6efd';

                const d = el.dataset;
                document.getElementById('hc-logo').src = d.logo;
                document.getElementById('hc-name').textContent = d.name;
                document.getElementById('hc-posts').textContent = d.posts + '개';
                document.getElementById('hc-views').textContent = d.views + '회';

                const latestWrap = document.getElementById('hc-latest-wrap');
                if (d.latest) {
                    document.getElementById('hc-latest').textContent = d.latest;
                    latestWrap.style.display = 'flex';
                } else {
                    latestWrap.style.display = 'none';
                }

                document.getElementById('hc-visit').href = d.siteurl || '#';

                hoverCard.style.display = 'block';
                positionHoverCard(el);
            }

            function positionHoverCard(el) {
                const item = el.querySelector('.source-item');
                const rect = item.getBoundingClientRect();
                const y = rect.bottom;
                const overflowX = rect.left + hoverCard.offsetWidth - window.innerWidth;
                hoverCard.style.left = (overflowX > 0 ? rect.right - hoverCard.offsetWidth : rect.left) + 'px';
                hoverCard.style.top  = y + 'px';
            }

            function hideHoverCard(el) {
                if (el) el.querySelector('.source-item span:not(.active-dot)').style.color = '';
                activeItem = null;
                hideTimer = setTimeout(() => { hoverCard.style.display = 'none'; }, 150);
            }

            hoverCard.addEventListener('mouseenter', () => clearTimeout(hideTimer));
            hoverCard.addEventListener('mouseleave', () => hideHoverCard());

            function openSourceModal() {
                document.getElementById('sourceModal').classList.add('show');
            }
            function closeSourceModal(e) {
                if (!e || e.target === document.getElementById('sourceModal')) {
                    document.getElementById('sourceModal').classList.remove('show');
                }
            }
        </script>
    </section>
</body>
</html>
