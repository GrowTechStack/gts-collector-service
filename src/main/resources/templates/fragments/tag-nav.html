<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- 태그 내비게이션 컴포넌트 -->
<div th:fragment="tagNav(currentTag)" class="tag-container mb-4 mt-2">
    <style>
        .tag-scroll-wrapper {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }
        .tag-scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .tag-chip {
            padding: 6px 16px;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            color: #6c757d;
            text-decoration: none !important;
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tag-chip:hover { border-color: #0d6efd; color: #0d6efd; }
        .tag-chip.active { background: #0d6efd; border-color: #0d6efd; color: #fff !important; }
    </style>
    <div class="tag-scroll-wrapper">
        <a th:href="@{/}" class="tag-chip" th:classappend="${currentTag == null} ? 'active'">
            <span>전체</span>
        </a>
        <a th:each="tag : ${ {'backend', 'frontend', 'ai', 'design', 'tech'} }"
           th:href="@{/(tag=${tag})}" 
           class="tag-chip" 
           th:classappend="${currentTag == tag} ? 'active'"
           th:text="${#strings.capitalize(tag)}">Tag</a>
    </div>
</div>

</html>
